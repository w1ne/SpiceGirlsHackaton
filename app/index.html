<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Spice Girls 🌶️</title>
  <link rel="stylesheet" href="./src/style.css" />
</head>
<body>
  <header>
    <h1>🌶️ Spice&nbsp;Girls</h1>
    <div class="hdr-btns">
      <button id="bleBtn" class="chip-btn">🔗 Connect</button>
      <button id="initBtn" class="icon" title="Set up compartments">🧂</button>
      <button id="settingsBtn" class="icon">⚙️</button>
    </div>
  </header>

  <main>
    <section id="slots" class="slots"></section>

    <section id="recipesWrap" class="recipes-wrap" hidden>
      <div class="recipes-head">🍲 Recipes <small class="muted">tap to make</small></div>
      <div id="recipes" class="slots"></div>
    </section>

    <section id="chat" class="chat"></section>
    <div id="interim" class="interim"></div>
    <div id="status" class="status"></div>
  </main>

  <footer>
    <button id="micBtn" class="talk">🎙️ Start talking</button>
  </footer>

  <dialog id="init">
    <form method="dialog">
      <h2>🧂 Set up compartments</h2>
      <p class="muted">Load each compartment and tell the device what's inside. Leave blank if empty.</p>
      <div id="initRows"></div>
      <div class="actions">
        <button id="saveInit" value="save">Save to device</button>
        <button value="cancel" class="ghost">Cancel</button>
      </div>
    </form>
  </dialog>

  <dialog id="settings">
    <form method="dialog">
      <h2>Settings</h2>
      <label>DeepInfra API key
        <input id="diKey" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="for voice (LLM)" />
      </label>
      <label class="row"><input id="ttsOn" type="checkbox" checked /> Speak replies</label>
      <div class="actions">
        <button id="saveSettings" value="save">Save</button>
        <button value="cancel" class="ghost">Cancel</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
