; SpiceDispenser ESP32 firmware.
; Build:  pio run                 (both envs)
; Flash:  pio run -e esp32-c3 -t upload   (or -e esp32-s3)
; Monitor: pio device monitor -b 115200

[env]
framework = arduino
monitor_speed = 115200
lib_deps =
    madhephaestus/ESP32Servo @ ^3.0.5
    bblanchon/ArduinoJson @ ^7.1.0
    h2zero/NimBLE-Arduino @ ^2.2.1

[env:esp32-c3]
platform = espressif32
board = esp32-c3-devkitm-1
build_flags = -D DISPENSER_BOARD_C3

[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
; this board has 4MB flash; pin size + a 4MB-fitting partition table
board_upload.flash_size = 4MB
board_build.flash_size = 4MB
board_build.partitions = huge_app.csv
; route Serial to the native USB CDC so logs appear on /dev/ttyACM*
build_flags = -D DISPENSER_BOARD_S3 -D ARDUINO_USB_CDC_ON_BOOT=1 -D ARDUINO_USB_MODE=1
